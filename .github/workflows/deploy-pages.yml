name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Avoid infinite loop when this workflow commits built files back to main
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    defaults:
      run:
        working-directory: exam-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: exam-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      # Repo Pages is set to branch main + path /. Publish build into repo root
      # without deleting source files (clean: false).
      - name: Deploy to main root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: exam-app/dist
          branch: main
          clean: false
          commit-message: 'Deploy exam-app to GitHub Pages [skip ci]'
